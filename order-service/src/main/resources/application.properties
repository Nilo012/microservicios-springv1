spring.application.name=order-service
server.port=8082

spring.datasource.url=jdbc:postgresql://localhost:5433/order_db
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=postgres
spring.datasource.password=postgres

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

clients.product-service.url=http://localhost:8081

spring.cloud.openfeign.client.config.productCatalogClient.connectTimeout=2000
spring.cloud.openfeign.client.config.productCatalogClient.readTimeout=3000
spring.cloud.openfeign.client.config.productCatalogClient.loggerLevel=basic

management.endpoints.web.exposure.include=health,info

logging.level.com.ms2.order_service=INFO
logging.level.com.ms2.order_service.client=DEBUG
logging.pattern.console=timestamp=%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX} level=%5p service=${spring.application.name} logger=%logger{36} message="%msg"%n
